name: Watch Secret Flying error fares

on:
  schedule:
    - cron: "*/15 * * * *"   # every 15 min (public repo = unlimited free minutes)
  workflow_dispatch: {}       # allows manual "Run workflow" button for testing

permissions:
  contents: write             # needed to commit seen.json back

concurrency:
  group: watch                # never run two checks at once (avoids git push races)
  cancel-in-progress: false

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run watcher
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
        run: node watch.mjs

      - name: Save seen.json back to the repo
        run: |
          git config user.name "error-flying-bot"
          git config user.email "actions@users.noreply.github.com"
          git add seen.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: update seen deals [skip ci]"
            git push
          fi
